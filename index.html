    <div class="cmdk-hint">Enter to run · Esc to close · ↑/↓ to navigate</div>
  </div>
</div>
<div class="cmdk-toast" id="cmdk-toast" aria-live="polite"></div>

<script>
(function () {
  // Lightweight anti-scrape / anti-automation hardening (deploy trigger update).
  // (Client-side protection is best-effort; it cannot be 100% bulletproof.)
  try {
    if (window.top !== window.self) {
      window.top.location = window.self.location.href;
    }
  } catch (_) {}

  const ua = (navigator.userAgent || '').toLowerCase();
  const looksAutomated =
    !!navigator.webdriver ||
    /headless|phantom|selenium|playwright|puppeteer|crawler|spider|scrapy|curl|wget|python|httpclient|go-http-client/.test(ua);

  if (looksAutomated) {
    document.documentElement.innerHTML = '<head><meta charset="UTF-8"><title>Access denied</title></head><body style="margin:0;background:#000;"></body>';
    return;
  }

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => {
    const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    if (tag !== 'input' && tag !== 'textarea') e.preventDefault();
  });
  document.addEventListener('keydown', e => {
    const key = (e.key || '').toLowerCase();
    const block =
      key === 'f12' ||
      (e.ctrlKey && e.shiftKey && (key === 'i' || key === 'j' || key === 'c')) ||
      (e.ctrlKey && (key === 'u' || key === 's'));
    if (block) e.preventDefault();
  });

  const enterScreen  = document.getElementById('enter-screen');
  const enterTitle   = document.querySelector('.enter-title');
  const video        = document.getElementById('video');
  const bgAudio      = document.getElementById('bg-audio');
  const overlay      = document.getElementById('overlay');
  const text         = document.getElementById('text');
  const scanlines    = document.getElementById('scanlines');
  const vignette     = document.getElementById('vignette');
  const volControl   = document.getElementById('volume-control');
  const volSlider    = document.getElementById('volume-slider');
  const volWave1     = document.getElementById('vol-wave1');
  const volWave2     = document.getElementById('vol-wave2');
  const cursorDot    = document.getElementById('cursor-dot');
  const cursorRing   = document.getElementById('cursor-ring');
  const cmdkOverlay  = document.getElementById('cmdk-overlay');
  const cmdkInput    = document.getElementById('cmdk-input');
  const cmdkList     = document.getElementById('cmdk-list');
  const cmdkToast    = document.getElementById('cmdk-toast');
  const introReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Intro text sequence:
  // _, V_, VE_, VEZ_, VEZO
  if (enterTitle) {
    const sequence = ['_', 'V_', 'VE_', 'VEZ_', 'VEZO'];
    let idx = 0;
    enterTitle.textContent = sequence[idx];
    if (!introReducedMotion) {
      const timer = setInterval(() => {
        idx++;
        if (idx >= sequence.length) {
          clearInterval(timer);
          return;
        }
        enterTitle.textContent = sequence[idx];
      }, 130);
    } else {
      enterTitle.textContent = 'VEZO';
    }

    enterTitle.addEventListener('mouseenter', () => enterTitle.classList.add('enter-blood'));
    enterTitle.addEventListener('mouseleave', () => enterTitle.classList.remove('enter-blood'));
  }

  function playEnterClick() {
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      const ctx = new AudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(780, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(620, ctx.currentTime + 0.045);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.05, ctx.currentTime + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.055);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.06);
      setTimeout(() => ctx.close().catch(() => {}), 160);
    } catch (_) {}
  }

  /* ── CURSOR ── */
  let mx = -100, my = -100;
  let rx = -100, ry = -100;
  let lastTrailX = -9999, lastTrailY = -9999;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorDot.style.left = mx + 'px';
    cursorDot.style.top  = my + 'px';

    // throttle trail — only emit after ~10px of movement
    // (identical look, but ~3-4x less DOM churn than before)
    const dx = mx - lastTrailX, dy = my - lastTrailY;
    if (dx*dx + dy*dy < 100) return;
    lastTrailX = mx; lastTrailY = my;

    const p = document.createElement('div');
    p.className = 'trail-particle';
    p.style.left = mx + 'px';
    p.style.top  = my + 'px';
    const size = Math.random() * 7 + 3;
    p.style.width  = size + 'px';
    p.style.height = size + 'px';
    p.style.setProperty('--drift-x', `${(Math.random() - 0.5) * 16}px`);
    const grayVal = Math.floor(Math.random() * 80);
    const grayVal2 = Math.floor(Math.random() * 40);
    p.style.background = `radial-gradient(circle, rgba(${80 + grayVal},${80 + grayVal},${80 + grayVal},${Math.random() * 0.28 + 0.68}) 0%, rgba(${grayVal2},${grayVal2},${grayVal2},0.4) 100%)`;
    p.style.boxShadow = `0 0 10px rgba(90,90,90,0.9), 0 0 22px rgba(20,20,20,0.55)`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1050);
  });

  // fade cursor out when it leaves the window, back in on return
  document.addEventListener('mouseleave', () => document.body.classList.add('cursor-gone'));
  document.addEventListener('mouseenter', () => document.body.classList.remove('cursor-gone'));

  // click / press feedback
  document.addEventListener('pointerdown',   () => document.body.classList.add('cursor-pressed'));
  document.addEventListener('pointerup',     () => document.body.classList.remove('cursor-pressed'));
  document.addEventListener('pointercancel', () => document.body.classList.remove('cursor-pressed'));

  // ring lags behind slightly
  function animateRing() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    cursorRing.style.left = rx + 'px';
    cursorRing.style.top  = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();

  // hover effect on interactive elements
  document.querySelectorAll('a, input, button, .badge, .social, .widget-join, #enter-screen').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
  });

  /* ── COMMAND PALETTE ── */
  const COMMANDS = [
    {
      id: 'copy-discord',
      label: 'Copy Discord username',
      hint: 'copy',
      run: async () => {
        try { await navigator.clipboard.writeText('neh01_'); } catch (_) {}
      }
    },
    {
      id: 'join-server',
      label: 'Open Discord server',
      hint: 'open',
      run: () => window.open('https://discord.gg/MPj5QS75cD', '_blank', 'noopener')
    },
    {
      id: 'toggle-mute',
      label: 'Toggle music mute',
      hint: 'audio',
      run: () => {
        bgAudio.muted = !bgAudio.muted;
        if (!bgAudio.muted && bgAudio.volume === 0) bgAudio.volume = 0.5;
        const pct = Math.round(bgAudio.muted ? 0 : bgAudio.volume * 100);
        volSlider.value = pct;
        updateSliderTrack(pct);
      }
    },
    {
      id: 'toggle-effects',
      label: 'Toggle visual effects',
      hint: 'fx',
      run: () => document.body.classList.toggle('effects-off')
    },
    {
      id: 'copy-link',
      label: 'Copy profile link',
      hint: 'share',
      run: async () => {
        try { await navigator.clipboard.writeText(window.location.href); } catch (_) {}
      }
    }
  ];

  let cmdkOpen = false;
  let cmdkFiltered = COMMANDS.slice();
  let cmdkActive = 0;
  let cmdkToastTimer = null;

  function showCmdkToast(text) {
    if (!cmdkToast) return;
    cmdkToast.textContent = text;
    cmdkToast.classList.remove('show');
    clearTimeout(cmdkToastTimer);
    // Force reflow so repeat triggers replay glitch.
    void cmdkToast.offsetWidth;
    cmdkToast.classList.add('show');
    cmdkToastTimer = setTimeout(() => {
      cmdkToast.classList.remove('show');
    }, 1300);
  }

  function renderCmdk() {
    if (!cmdkList) return;
    if (!cmdkFiltered.length) {
      cmdkList.innerHTML = '<div class="cmdk-empty">No matching command.</div>';
      return;
    }
    cmdkList.innerHTML = cmdkFiltered.map((c, i) =>
      `<button type="button" class="cmdk-item${i === cmdkActive ? ' active' : ''}" data-cmd="${c.id}"><span>${c.label}</span><span class="cmdk-key">${c.hint}</span></button>`
    ).join('');
  }

  function filterCmdk() {
    const q = (cmdkInput.value || '').trim().toLowerCase();
    cmdkFiltered = !q
      ? COMMANDS.slice()
      : COMMANDS.filter(c => (`${c.label} ${c.hint} ${c.id}`).toLowerCase().includes(q));
    cmdkActive = 0;
    renderCmdk();
  }

  function openCmdk() {
    if (!cmdkOverlay || !cmdkInput) return;
    cmdkOpen = true;
    cmdkOverlay.classList.add('show');
    cmdkOverlay.setAttribute('aria-hidden', 'false');
    cmdkInput.value = '';
    cmdkFiltered = COMMANDS.slice();
    cmdkActive = 0;
    renderCmdk();
    setTimeout(() => cmdkInput.focus(), 0);
  }

  function closeCmdk() {
    if (!cmdkOverlay) return;
    cmdkOpen = false;
    cmdkOverlay.classList.remove('show');
    cmdkOverlay.setAttribute('aria-hidden', 'true');
  }

  function runCmdkActive() {
    const cmd = cmdkFiltered[cmdkActive];
    if (!cmd) return;
    try { cmd.run(); } catch (_) {}
    showCmdkToast(`SUCCESSFULLY EXECUTED · ${cmd.label}`);
    closeCmdk();
  }

  if (cmdkInput) {
    cmdkInput.addEventListener('input', filterCmdk);
    cmdkInput.addEventListener('keydown', e => {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (cmdkFiltered.length) cmdkActive = (cmdkActive + 1) % cmdkFiltered.length;
        renderCmdk();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (cmdkFiltered.length) cmdkActive = (cmdkActive - 1 + cmdkFiltered.length) % cmdkFiltered.length;
        renderCmdk();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        runCmdkActive();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        closeCmdk();
      }
    });
  }

  if (cmdkList) {
    cmdkList.addEventListener('click', e => {
      const btn = e.target.closest('.cmdk-item');
      if (!btn) return;
      const id = btn.getAttribute('data-cmd');
      const idx = cmdkFiltered.findIndex(c => c.id === id);
      if (idx >= 0) {
        cmdkActive = idx;
        runCmdkActive();
      }
    });
  }

  if (cmdkOverlay) {
    cmdkOverlay.addEventListener('click', e => {
      if (e.target === cmdkOverlay) closeCmdk();
    });
  }

  document.addEventListener('keydown', e => {
    const key = (e.key || '').toLowerCase();
    const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
    const isTyping = tag === 'input' || tag === 'textarea' || e.target.isContentEditable;
    if ((e.ctrlKey && key === 'k') || (!isTyping && key === 'k')) {
      e.preventDefault();
      if (cmdkOpen) closeCmdk(); else openCmdk();
      return;
    }
    if (cmdkOpen && key === 'escape') {
      e.preventDefault();
      closeCmdk();
    }
  });

  /* ══════════════════════════════
     3D CARD TILT — perspective follow
     • max ±7° rotation on X / Y based on cursor position vs. card center
     • smooth lerp towards target (no jitter)
     • inner depth layers (.profile-header / .widgets / .footer) move
       at different Z depths for a true parallax feel
     • radial glare follows the cursor across the card surface
  ══════════════════════════════ */
  const tiltCard = document.querySelector('.profile-card');
  const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
  let prefersReducedMotion = reducedMotionQuery.matches;

  if (reducedMotionQuery.addEventListener) {
    reducedMotionQuery.addEventListener('change', e => { prefersReducedMotion = e.matches; });
  } else if (reducedMotionQuery.addListener) {
    reducedMotionQuery.addListener(e => { prefersReducedMotion = e.matches; });
  }

  if (tiltCard) {
    // ── GLOBAL 3D CARD TILT ──
    // The card tracks the cursor ANYWHERE on screen:
    //   cursor LEFT  of card center → card leans LEFT  (left edge forward)
    //   cursor RIGHT of card center → card leans RIGHT (right edge forward)
    //   cursor ABOVE card center    → card leans UP    (top edge forward)
    //   cursor BELOW card center    → card leans DOWN  (bottom edge forward)
    // It's "attractive" — the card looks like it's facing the cursor.
    const MAX_DEG = 18;         // peak tilt angle
    const EASE    = 0.12;       // lerp speed (lower = smoother, laggier)
    const RANGE_X = 700;        // px of horizontal cursor distance = max tilt
    const RANGE_Y = 500;        // px of vertical cursor distance = max tilt

    let tx = 0, ty = 0;         // target rotation
    let cx = 0, cy = 0;         // current (eased)
    let mouseX = -9999, mouseY = -9999;
    let hasMouse = false;

    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

    const updateMouse = (x, y) => {
      mouseX = x;
      mouseY = y;
      hasMouse = true;
    };

    // Primary path for modern browsers / devices.
    document.addEventListener('pointermove', e => {
      updateMouse(e.clientX, e.clientY);
    }, { passive: true });

    // Fallback for older browsers.
    document.addEventListener('mousemove', e => {
      updateMouse(e.clientX, e.clientY);
    }, { passive: true });

    // Touch fallback (iOS/Safari cases where pointer events are inconsistent).
    document.addEventListener('touchmove', e => {
      if (!e.touches || !e.touches[0]) return;
      updateMouse(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    document.addEventListener('touchstart', e => {
      if (!e.touches || !e.touches[0]) return;
      updateMouse(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    document.addEventListener('mouseleave', () => { hasMouse = false; });
    window.addEventListener('blur',         () => { hasMouse = false; });

    (function tick() {
      // Respect OS/browser reduced-motion dynamically.
      if (prefersReducedMotion) {
        tx = 0; ty = 0;
        cx += (tx - cx) * EASE;
        cy += (ty - cy) * EASE;
        tiltCard.classList.remove('tilt-active');
        tiltCard.style.transform = `rotateX(${cx.toFixed(2)}deg) rotateY(${cy.toFixed(2)}deg)`;
        requestAnimationFrame(tick);
        return;
      }

      if (hasMouse) {
        // use the card center as the 3D pivot — tilt is relative to it
        const rect = tiltCard.getBoundingClientRect();
        if (rect.width) {
          const cxCard = rect.left + rect.width  / 2;
          const cyCard = rect.top  + rect.height / 2;
          // normalized cursor offset from card center (-1..1, clamped)
          const nx = clamp((mouseX - cxCard) / RANGE_X, -1, 1);
          const ny = clamp((mouseY - cyCard) / RANGE_Y, -1, 1);

          // ATTRACT: card face turns TOWARD the cursor.
          //   mouse right → rotateY negative → right edge comes forward.
          //   mouse down  → rotateX positive → bottom edge comes forward.
          ty = -nx * MAX_DEG;
          tx =  ny * MAX_DEG;

          // glare hotspot = projected cursor position on card surface
          const gx = clamp((mouseX - rect.left) / rect.width,  0, 1);
          const gy = clamp((mouseY - rect.top)  / rect.height, 0, 1);
          tiltCard.style.setProperty('--glare-x', (gx * 100).toFixed(1) + '%');
          tiltCard.style.setProperty('--glare-y', (gy * 100).toFixed(1) + '%');
        }
      } else {
        tx = 0; ty = 0;
      }

      cx += (tx - cx) * EASE;
      cy += (ty - cy) * EASE;
      if (Math.abs(cx) < 0.01) cx = 0;
      if (Math.abs(cy) < 0.01) cy = 0;

      // Activate class for CSS glare (always on while cursor is present)
      if (hasMouse) tiltCard.classList.add('tilt-active');
      else          tiltCard.classList.remove('tilt-active');

      // Rigid transform — the whole card rotates as one slab.
      tiltCard.style.transform =
        `rotateX(${cx.toFixed(2)}deg) rotateY(${cy.toFixed(2)}deg)`;

      // Dynamic directional sheen — the virtual light direction rotates
      // with the card so the broad sheen naturally sweeps across glass.
      const lightAngle = 135 - cy * 2.2 + cx * 1.4;
      tiltCard.style.setProperty('--light-angle', lightAngle.toFixed(1) + 'deg');

      // Dynamic 4-side bevel highlight. In this attractive model:
      //   cy (rotateY) negative → right edge FORWARD → right rim brighter
      //   cx (rotateX) positive → bottom edge FORWARD → bottom rim brighter
      const rimRight  = clamp(-cy / MAX_DEG, 0, 1);
      const rimLeft   = clamp( cy / MAX_DEG, 0, 1);
      const rimBottom = clamp( cx / MAX_DEG, 0, 1);
      const rimTop    = clamp(-cx / MAX_DEG, 0, 1);
      tiltCard.style.setProperty('--rim-left',   (0.08 + rimLeft   * 0.30).toFixed(3));
      tiltCard.style.setProperty('--rim-right',  (0.08 + rimRight  * 0.30).toFixed(3));
      tiltCard.style.setProperty('--rim-top',    (0.10 + rimTop    * 0.28).toFixed(3));
      tiltCard.style.setProperty('--rim-bottom', (0.05 + rimBottom * 0.22).toFixed(3));

      // Dynamic drop shadow — shadow falls OPPOSITE to the tilt, so
      // the leaning-forward side is closer to its shadow (grounded),
      // while the receding side is lifted with more shadow distance.
      const tiltMag = Math.min(1, (Math.abs(cx) + Math.abs(cy)) / (MAX_DEG * 1.2));
      const shadowX = ( cy * 2.2).toFixed(1);   // opposite of rotateY
      const shadowY = (14 - cx * 2.0).toFixed(1);
      const shadowBlur   = (55 + tiltMag * 45).toFixed(0);
      const shadowSpread = -(20 + tiltMag * 10).toFixed(0);
      const shadowAlpha  = (0.55 + tiltMag * 0.20).toFixed(3);
      tiltCard.style.boxShadow =
        `${shadowX}px ${shadowY}px ${shadowBlur}px ${shadowSpread}px rgba(0,0,0,${shadowAlpha}),` +
        ` 0 6px 18px -8px rgba(0,0,0,0.45),` +
        ` 0 0 0 1px rgba(0,0,0,0.35) inset,` +
        ` 0 1px 0 rgba(255,255,255,0.08) inset`;

      requestAnimationFrame(tick);
    })();
  }

  /* ── VOLUME SLIDER ── */
  function updateSliderTrack(val) {
    volSlider.style.setProperty('--val', val + '%');
    // mute icon states
    if (val == 0) {
      volWave1.style.opacity = '0';
      volWave2.style.opacity = '0';
    } else if (val < 50) {
      volWave1.style.opacity = '0.85';
      volWave2.style.opacity = '0';
    } else {
      volWave1.style.opacity = '0.85';
      volWave2.style.opacity = '0.5';
    }
  }

  // fade-in interval handle + "user took control" flag so we don't fight the user
  let volumeFadeInterval = null;
  let userTouchedVolume  = false;

  function stopVolumeFade() {
    if (volumeFadeInterval) {
      clearInterval(volumeFadeInterval);
      volumeFadeInterval = null;
    }
  }

  volSlider.addEventListener('input', () => {
    userTouchedVolume = true;
    stopVolumeFade();
    const val = parseInt(volSlider.value);
    bgAudio.volume = val / 100;
    bgAudio.muted  = val === 0;
    updateSliderTrack(val);
  });

  // also cancel fade the instant the user grabs the slider (before 'input' fires)
  ['pointerdown', 'mousedown', 'touchstart', 'keydown', 'wheel'].forEach(ev => {
    volSlider.addEventListener(ev, () => {
      userTouchedVolume = true;
      stopVolumeFade();
    }, { passive: true });
  });

  /* ── ENTER SEQUENCE ── */
  video.load();
  video.loop = true;
  bgAudio.load();
  video.addEventListener('ended', () => {
    video.currentTime = 0;
    video.play().catch(() => {});
  });

  // keyboard shortcuts: Enter / Space / any key also triggers entry
  const keyEnterHandler = (e) => {
    if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar' || e.code === 'Space') {
      e.preventDefault();
      enterScreen.click();
      document.removeEventListener('keydown', keyEnterHandler);
    }
  };
  document.addEventListener('keydown', keyEnterHandler);

  enterScreen.addEventListener('click', async () => {
    playEnterClick();
    enterScreen.classList.add('fade-out');
    setTimeout(() => enterScreen.remove(), 1000);

    // video plays silently as background visual (always muted)
    video.muted = true;
    try {
      await video.play();
    } catch (e) {
      await video.play().catch(() => {});
    }

    // start background music
    bgAudio.volume = 0;
    bgAudio.muted  = false;
    bgAudio.play().catch(() => { bgAudio.muted = true; bgAudio.play().catch(() => {}); });

    // slight delay so enter-screen fully fades before video appears
    setTimeout(() => video.classList.add('visible'), 200);

    setTimeout(() => {
      scanlines.classList.add('visible');
      vignette.classList.add('visible');
    }, 800);

    setTimeout(() => overlay.classList.add('open'), 600);
    setTimeout(() => text.classList.add('show'), 1800);

    // show volume control
    setTimeout(() => volControl.classList.add('visible'), 2200);

    // fade music in — starts after video is visually present, stops if user grabs slider
    setTimeout(() => {
      if (bgAudio.muted || userTouchedVolume) return;
      stopVolumeFade();
      volumeFadeInterval = setInterval(() => {
        if (userTouchedVolume) { stopVolumeFade(); return; }
        bgAudio.volume = Math.min(bgAudio.volume + 0.015, 1);
        const pct = Math.round(bgAudio.volume * 100);
        updateSliderTrack(pct);
        volSlider.value = pct;
        if (bgAudio.volume >= 1) stopVolumeFade();
      }, 80);
    }, 900);
  }, { once: true });

  /* ── TYPEWRITER CREDIT LOOP ── */
  const TW_TEXTS        = [
    "not your average guy.",
    "vezo. est. 2026",
    "built different."
  ];
  const TW_TYPE_SPEED   = 52;
  const TW_DELETE_SPEED = 28;
  const TW_HOLD         = 3000;
  const TW_GAP          = 500;

  const twEl = document.getElementById('tw-text');
  let twIdx = 0;
  let twTimer = null;

  function twType(text, done) {
    let i = 0;
    twEl.textContent = '';
    (function step() {
      twEl.textContent = text.slice(0, i);
      if (i++ < text.length) twTimer = setTimeout(step, TW_TYPE_SPEED);
      else twTimer = setTimeout(done, TW_HOLD);
    })();
  }

  function twErase(done) {
    (function step() {
      const t = twEl.textContent;
      if (t.length === 0) { twTimer = setTimeout(done, TW_GAP); return; }
      twEl.textContent = t.slice(0, -1);
      twTimer = setTimeout(step, TW_DELETE_SPEED);
    })();
  }

  function twLoop() {
    twType(TW_TEXTS[twIdx % TW_TEXTS.length], function() {
      twErase(function() {
        twIdx++;
        twLoop();
      });
    });
  }

  setTimeout(twLoop, 2200);

  /* ── TYPEWRITER TOOLTIP (badges + socials) ── */
  document.querySelectorAll('.badge, .social').forEach(el => {
    const tip     = el.dataset.tip || '';
    const textEl  = el.querySelector('.badge-tip-text');
    if (!textEl) return;

    let typingTimer = null;

    const type = () => {
      clearTimeout(typingTimer);
      let i = 0;
      textEl.textContent = '';
      const tick = () => {
        if (i <= tip.length) {
          textEl.textContent = tip.slice(0, i);
          i++;
          typingTimer = setTimeout(tick, 55);
        }
      };
      tick();
    };

    const stop = () => clearTimeout(typingTimer);

    el.addEventListener('mouseenter', type);
    el.addEventListener('focus',      type);
    el.addEventListener('mouseleave', stop);
    el.addEventListener('blur',       stop);
  });

  /* ── ANIMATED VIEW COUNTER ── */
  const viewEl = document.getElementById('view-count');
  if (viewEl) {
    // persist count in localStorage so it grows per page load (demo counter)
    const KEY = 'vezo_views';
    const stored = parseInt(localStorage.getItem(KEY) || '3210', 10);
    const next = stored + 1;
    try { localStorage.setItem(KEY, String(next)); } catch (_) {}

    // count-up animation
    let current = Math.max(0, next - 87);
    const target = next;
    const format = n => n.toLocaleString('en-US');
    const step = () => {
      const diff = target - current;
      if (diff <= 0) { viewEl.textContent = format(target); return; }
      current += Math.max(1, Math.ceil(diff / 10));
      viewEl.textContent = format(current);
      requestAnimationFrame(step);
    };
    // delay the counter start until card is visible
    setTimeout(step, 2000);
  }

  /* ── WATERMARK fade-in ── */
  const watermark = document.getElementById('watermark');
  if (watermark) {
    setTimeout(() => watermark.classList.add('show'), 2400);
  }

  /* ── LIVE CLOCK (Europe/Istanbul) ── */
  const clockEl = document.getElementById('profile-clock');
  if (clockEl) {
    const fmt = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Europe/Istanbul',
      hour:   '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    });
    const tickClock = () => { clockEl.textContent = fmt.format(new Date()); };
    tickClock();
    setInterval(tickClock, 1000);
  }

  /* ══════════════════════════════
     REVEAL ORCHESTRATION
     • .profile-role + .profile-meta stay hidden until both widgets have loaded
     • once Lanyard presence AND Discord server stats come in, we add `.revealed`
     • safety timeout: reveal anyway after 6s even if a data source fails
  ══════════════════════════════ */
  const roleEls = document.querySelectorAll('.profile-role, .profile-meta');
  let presenceReady   = false;
  let serverStatsReady = false;
  let widgetsRevealed = false;

  function maybeRevealWidgets() {
    if (widgetsRevealed) return;
    if (presenceReady && serverStatsReady) {
      widgetsRevealed = true;
      roleEls.forEach(el => el.classList.add('revealed'));
    }
  }
  // safety net — if something never resolves, still reveal
  setTimeout(() => {
    if (!widgetsRevealed) {
      widgetsRevealed = true;
      roleEls.forEach(el => el.classList.add('revealed'));
    }
  }, 6000);

  // expose the readiness setters so the presence / server-stats blocks below
  // (which live in their own scopes via `if`) can signal progress
  window.__hdMark = key => {
    if (key === 'presence')  presenceReady    = true;
    if (key === 'server')    serverStatsReady = true;
    maybeRevealWidgets();
  };

  /* ── DISCORD SERVER LIVE STATS ── */
  const onlineEl    = document.getElementById('server-online');
  const membersEl   = document.getElementById('server-members');
  const serverName  = document.getElementById('server-name');
  const serverIconImg = document.getElementById('server-icon-img');
  const serverIconSvg = document.getElementById('server-icon-svg');
  if (onlineEl && membersEl) {
    const INVITE_CODE = 'MPj5QS75cD';
    const fmtNum = n => (n ?? 0).toLocaleString('en-US');

    async function pullServerStats() {
      try {
        const res  = await fetch(
          `https://discord.com/api/v10/invites/${INVITE_CODE}?with_counts=true&with_expiration=false`,
          { headers: { 'Accept': 'application/json' } }
        );
        if (!res.ok) throw new Error('invite fetch ' + res.status);
        const json = await res.json();
        if (json && typeof json.approximate_member_count === 'number') {
          membersEl.textContent = fmtNum(json.approximate_member_count);
        }
        if (json && typeof json.approximate_presence_count === 'number') {
          onlineEl.textContent = fmtNum(json.approximate_presence_count);
        }
        if (json.guild) {
          if (serverName && json.guild.name) {
            serverName.textContent = json.guild.name;
          }
          if (serverIconImg && json.guild.icon) {
            const ext = json.guild.icon.startsWith('a_') ? 'gif' : 'webp';
            serverIconImg.src = `https://cdn.discordapp.com/icons/${json.guild.id}/${json.guild.icon}.${ext}?size=64`;
            serverIconImg.onload = () => {
              serverIconImg.style.display = 'block';
              if (serverIconSvg) serverIconSvg.style.display = 'none';
            };
          }
        }
      } catch (_) {
        onlineEl.textContent  = '—';
        membersEl.textContent = '—';
      } finally {
        window.__hdMark('server');
      }
    }
    pullServerStats();
    setInterval(pullServerStats, 60 * 1000);
  } else {
    window.__hdMark('server');
  }

  /* ══════════════════════════════
     DISCORD PRESENCE — Lanyard WebSocket
     https://github.com/Phineas/lanyard
  ══════════════════════════════ */
  const DISCORD_ID = '917462644624097352';

  const presenceEl    = document.getElementById('presence-widget');
  const presenceTag   = document.getElementById('presence-tag');
  const presenceTitle = document.getElementById('presence-title');
  const presenceSub   = document.getElementById('presence-sub');
  const presenceDot   = document.getElementById('presence-status-dot');
  const presenceImg   = document.getElementById('presence-avatar-img');
  const presenceBar   = document.getElementById('presence-progress');
  const presenceBarFill = document.getElementById('presence-progress-bar');

  // main profile-card avatar (the big one at the top) + Nitro decoration
  const profileAvatarEl   = document.getElementById('profile-avatar');
  const profileAvatarImg  = document.getElementById('profile-avatar-img');
  const profileDecoration = document.getElementById('profile-avatar-decoration');
  const profileNameEl     = document.getElementById('profile-name');

  function setPresenceTag(text) {
    if (!presenceTag) return;
    if (!text) {
      presenceTag.hidden = true;
      presenceTag.textContent = '';
    } else {
      presenceTag.hidden = false;
      presenceTag.textContent = text;
    }
  }

  if (presenceEl) {
    const STATUS_LABEL = {
      online:  'Online',
      idle:    'Idle',
      dnd:     'Do Not Disturb',
      offline: 'Offline'
    };

    // https://discord.com/developers/docs/topics/gateway-events#activity-object-activity-types
    const ACT_PLAYING   = 0;
    const ACT_STREAMING = 1;
    const ACT_LISTENING = 2;
    const ACT_WATCHING  = 3;
    const ACT_CUSTOM    = 4;
    const ACT_COMPETING = 5;

    let spotifyTimer = null;

    // Lanyard quicklink — https://github.com/Phineas/lanyard#quicklinks
    //   GET https://api.lanyard.rest/<id>.<png|gif|webp|jpg|jpeg>
    // Gives us the avatar directly without needing the hash from the API response.
    const LANYARD_AVATAR = ext => `https://api.lanyard.rest/${DISCORD_ID}.${ext}`;

    function avatarUrl(user) {
      if (user && user.avatar) {
        const ext = user.avatar.startsWith('a_') ? 'gif' : 'png';
        return `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${ext}?size=128`;
      }
      // fallback: Lanyard quicklink (works without presence data)
      return LANYARD_AVATAR('png');
    }

    // load both presence widget and big profile avatar from Lanyard instantly
    presenceImg.src = LANYARD_AVATAR('png');
    if (profileAvatarImg) {
      profileAvatarImg.src = LANYARD_AVATAR('png');
    }

    // Discord avatar decoration URL (animated APNG for Nitro users)
    //   https://cdn.discordapp.com/avatar-decoration-presets/{asset}.png?size=240&passthrough=true
    function decorationUrl(asset) {
      if (!asset) return null;
      return `https://cdn.discordapp.com/avatar-decoration-presets/${asset}.png?size=240&passthrough=true`;
    }

    function applyProfileDecoration(user) {
      if (!profileDecoration || !user) return;
      const asset = user.avatar_decoration_data && user.avatar_decoration_data.asset;
      const url   = decorationUrl(asset);
      if (url) {
        if (profileDecoration.dataset.src !== url) {
          profileDecoration.dataset.src = url;
          profileDecoration.hidden = false;
          profileDecoration.classList.remove('loaded');
          profileDecoration.onload  = () => profileDecoration.classList.add('loaded');
          profileDecoration.onerror = () => {
            profileDecoration.hidden = true;
            profileDecoration.removeAttribute('src');
          };
          profileDecoration.src = url;
        }
      } else {
        profileDecoration.hidden = true;
        profileDecoration.classList.remove('loaded');
        profileDecoration.removeAttribute('src');
      }
    }

    function render(data) {
      clearInterval(spotifyTimer);
      spotifyTimer = null;

      if (!data || !data.discord_user) {
        presenceEl.dataset.state = 'error';
        setPresenceTag('');
        presenceTitle.textContent = 'Not tracked by Lanyard';
        presenceSub.textContent   = 'join discord.gg/lanyard';
        presenceDot.dataset.status = 'offline';
        if (window.__hdMark) window.__hdMark('presence');
        return;
      }

      presenceEl.dataset.state = 'live';
      presenceEl.classList.remove('is-spotify', 'is-playing', 'is-custom');
      presenceBar.hidden = true;
      presenceBarFill.style.width = '0%';
      if (window.__hdMark) window.__hdMark('presence');

      const { discord_user, discord_status, activities, listening_to_spotify, spotify } = data;
      presenceDot.dataset.status = discord_status || 'offline';

      // Update big profile avatar from Discord via Lanyard
      if (profileAvatarImg) {
        const url = avatarUrl(discord_user);
        if (profileAvatarImg.src !== url) {
          profileAvatarImg.classList.remove('loaded');
          profileAvatarImg.src = url;
        }
      }
      applyProfileDecoration(discord_user);

      // Username is intentionally pinned to "VEZO" in the markup and is
      // NOT overwritten by Discord's global_name — this is the chosen handle.

      // ── SPOTIFY ──
      if (listening_to_spotify && spotify) {
        presenceEl.classList.add('is-spotify');
        setPresenceTag('Listening on Spotify');
        presenceImg.src = spotify.album_art_url || avatarUrl(discord_user);
        presenceTitle.textContent = spotify.song || '—';
        presenceSub.textContent   = `by ${spotify.artist || '—'}`;

        // live progress bar
        if (spotify.timestamps && spotify.timestamps.start && spotify.timestamps.end) {
          presenceBar.hidden = false;
          const start = spotify.timestamps.start;
          const end   = spotify.timestamps.end;
          const duration = end - start;
          const tick = () => {
            const now = Date.now();
            const pct = Math.max(0, Math.min(100, ((now - start) / duration) * 100));
            presenceBarFill.style.width = pct + '%';
          };
          tick();
          spotifyTimer = setInterval(tick, 1000);
        }
        return;
      }

      // ── GAME / ACTIVITY ──
      const game   = activities && activities.find(a => a.type === ACT_PLAYING);
      const stream = activities && activities.find(a => a.type === ACT_STREAMING);
      const watch  = activities && activities.find(a => a.type === ACT_WATCHING);
      const custom = activities && activities.find(a => a.type === ACT_CUSTOM);
      const act    = game || stream || watch;

      presenceImg.src = avatarUrl(discord_user);

      if (act) {
        presenceEl.classList.add('is-playing');
        const verb = act.type === ACT_STREAMING ? 'Streaming'
                   : act.type === ACT_WATCHING  ? 'Watching'
                   : 'Playing';
        setPresenceTag(verb);
        presenceTitle.textContent = act.name || '—';
        presenceSub.textContent   = act.details || act.state || STATUS_LABEL[discord_status] || '';
        return;
      }

      if (custom) {
        presenceEl.classList.add('is-custom');
        const emoji = custom.emoji
          ? (custom.emoji.id
              ? ''    /* skip custom server emojis — need URL not text */
              : (custom.emoji.name || '') + ' ')
          : '';
        const state = custom.state || '';
        setPresenceTag('Custom Status');
        presenceTitle.textContent = (emoji + state).trim() || (discord_user.global_name || discord_user.username);
        presenceSub.textContent   = STATUS_LABEL[discord_status] || 'Offline';
        return;
      }

      // plain status
      setPresenceTag(STATUS_LABEL[discord_status] || 'Offline');
      presenceTitle.textContent = discord_user.global_name || discord_user.username || 'VEZO';
      presenceSub.textContent   = `@${discord_user.username || 'unknown'}`;
    }

    // ── WebSocket connection ──
    let ws = null;
    let heartbeat = null;
    let reconnectTimer = null;
    let initTimeoutTimer = null;
    let gotInitState = false;

    // If WebSocket connects but INIT_STATE never arrives, fall back to REST
    // to determine whether the user is actually tracked by Lanyard.
    async function checkTrackingStatusViaRest() {
      if (gotInitState) return;
      try {
        const res  = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
        const json = await res.json();
        if (json && json.success && json.data) {
          render(json.data);
          gotInitState = true;
        } else {
          // user_not_monitored or similar
          presenceEl.dataset.state = 'error';
          presenceTitle.textContent = 'Not tracked by Lanyard';
          presenceSub.textContent   = 'join discord.gg/lanyard';
        }
      } catch (_) {
        presenceEl.dataset.state = 'error';
        presenceTitle.textContent = 'Connection failed';
        presenceSub.textContent   = 'retrying…';
      }
    }

    function connect() {
      clearTimeout(reconnectTimer);
      gotInitState = false;

      try {
        ws = new WebSocket('wss://api.lanyard.rest/socket');
      } catch (e) {
        scheduleReconnect();
        return;
      }

      ws.addEventListener('open', () => { /* waiting for op:1 hello */ });

      ws.addEventListener('message', ev => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch (_) { return; }
        const { op, t, d } = msg;

        if (op === 1) {
          // HELLO — subscribe to our user immediately (per Lanyard docs)
          ws.send(JSON.stringify({
            op: 2,
            d: { subscribe_to_id: DISCORD_ID }
          }));
          const interval = (d && d.heartbeat_interval) ? d.heartbeat_interval : 30000;
          clearInterval(heartbeat);
          heartbeat = setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ op: 3 }));
          }, interval);
          // If INIT_STATE doesn't arrive in 6s → user likely not tracked
          clearTimeout(initTimeoutTimer);
          initTimeoutTimer = setTimeout(checkTrackingStatusViaRest, 6000);
        } else if (op === 0) {
          if (t === 'INIT_STATE' || t === 'PRESENCE_UPDATE') {
            gotInitState = true;
            clearTimeout(initTimeoutTimer);
            render(d);
          }
        }
      });

      ws.addEventListener('close', scheduleReconnect);
      ws.addEventListener('error', () => {
        try { ws.close(); } catch (_) {}
      });
    }

    function scheduleReconnect() {
      clearInterval(heartbeat);
      clearTimeout(initTimeoutTimer);
      heartbeat = null;
      presenceEl.dataset.state = 'error';
      reconnectTimer = setTimeout(connect, 4000);
    }

    // Defer connection slightly so the reveal animation finishes first
    setTimeout(connect, 1500);
  }

})();
</script>
</body>
</html>
